name: Build & Deploy

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/oxcl/relevance/build-env:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Install relevance
        run: |
          python3 -m venv /opt/venv
          /opt/venv/bin/pip install .
          echo "/opt/venv/bin" >> $GITHUB_PATH

      - name: Restore cached repo
        uses: actions/cache/restore@v5
        id: cache
        with:
          path: fdroid/repo/
          key: fdroid-repo-${{ hashFiles('apps.yml') }}
          restore-keys: fdroid-repo-

      - name: Debug environment
        run: |
          echo "Checking secrets..."
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "KEYSTORE_BASE64 is set (length: ${#KEYSTORE_BASE64})"
          else
            echo "KEYSTORE_BASE64 is NOT set"
          fi
          if [ -n "$KEYSTORE_PASSWORD" ]; then
            echo "KEYSTORE_PASSWORD is set"
          else
            echo "KEYSTORE_PASSWORD is NOT set"
          fi
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}

      - name: Decode keystore
        run: |
          mkdir -p fdroid
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "ERROR: KEYSTORE_BASE64 is empty or not set"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > fdroid/keystore.p12
          ls -la fdroid/keystore.p12
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build
        run: relevance run --config apps.yml
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}

      - name: Generate F-Droid index
        working-directory: fdroid
        run: fdroid update --create-metadata
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}

      - name: Save repo cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: fdroid/repo/
          key: fdroid-repo-${{ github.run_id }}

      - name: Deploy to Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./fdroid/repo
